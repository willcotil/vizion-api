<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="previaLogin.css">
    <title>Buildup - Cadastro Empreiteira</title>
</head>
<body>
    <section class="login-section">
        <div class="container">
            <div class="form-header">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <h1>Buildup</h1>
                <p class="subtitle">Cadastro de Empreiteira</p>
            </div>

            <form class="cadastro-form">
                <div class="form-group">
                    <label for="cnpj">
                        <i class="fas fa-id-card"></i> CNPJ
                    </label>
                    <input type="text" id="cnpj" placeholder="xx.xxx.xxx/xxxx-xx" required>
                    <span class="form-line"></span>
                </div>

                <div class="form-group">
                    <label for="nome">
                        <i class="fas fa-store"></i> Nome Fantasia
                    </label>
                    <input type="text" id="nome" placeholder="nome da empresa" required>
                    <span class="form-line"></span>
                </div>

                <div class="form-group">
                    <label for="razao">
                        <i class="fas fa-file-contract"></i> Razão Social
                    </label>
                    <input type="text" id="razao" placeholder="razão social completa" required>
                    <span class="form-line"></span>
                </div>

                <div class="form-group">
                    <label for="endereco">
                        <i class="fas fa-map-marker-alt"></i> Endereço
                    </label>
                    <input type="text" id="endereco" placeholder="cep, número e complemento" required>
                    <span class="form-line"></span>
                </div>

                <div class="form-group">
                    <label for="usuario">
                        <i class="fas fa-user"></i> Usuário
                    </label>
                    <input type="text" id="usuario" placeholder="seu login" required>
                    <span class="form-line"></span>
                </div>

                <button type="submit" class="btn-cadastrar">
                    <i class="fas fa-check-circle"></i> Cadastrar
                </button>
            </form>

            <div class="form-footer">
                <p>Já possui conta? <a href="#login">Faça login aqui</a></p>
            </div>
        </div>
    </section>
    <script>
        document.querySelector('.cadastro-form').addEventListener('submit', function(e) {
            e.preventDefault();

            window.location.href = 'paginaInicial.html';
            alert('Cadastro realizado com sucesso!');
        });
    </script>
</body>
</html>
